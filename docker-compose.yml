
x-backend-common: &backend-common
  build:
    context: .
    dockerfile: ./backend/Dockerfile
  restart: unless-stopped
  env_file: .env
  volumes:
    - ./backend:/app
    - ./logs:/app/logs
    - ./data:/app/data
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: market_user
      POSTGRES_PASSWORD: market_pass
      POSTGRES_DB: market_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U market_user -d market_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    <<: *backend-common
    environment:
      APP_ROLE: api
      EXECUTION_MODE: ${EXECUTION_MODE:-paper}
    ports:
      - "8000:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  market_worker:
    <<: *backend-common
    environment:
      APP_ROLE: market_worker
      EXECUTION_MODE: ${EXECUTION_MODE:-paper}
    command: python -m runtime.market_worker

  execution_worker:
    <<: *backend-common
    environment:
      APP_ROLE: execution_worker
      EXECUTION_MODE: ${EXECUTION_MODE:-paper}
    command: python -m runtime.execution_worker

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:

